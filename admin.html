<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
    .sidebar { background: white; border-right: 1px solid #dee2e6; min-height: 100vh; padding: 20px; }
    .preview-container { padding: 20px; }
    .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); }
    .table-preview { font-size: 0.9rem; }
    .is-exam { background-color: #fff3cd !important; font-weight: bold; }
    #loadingOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 9999;
    }
  </style>
</head>
<body>

<div id="loadingOverlay">
  <div class="spinner-border text-primary" role="status"></div>
  <span class="ms-2">處理中，請稍候...</span>
</div>

<div class="container-fluid">
  <div class="row">
    <div class="col-md-4 sidebar">
      <h4 class="mb-4">🚀 班級建立與預覽</h4>
      
      <div class="mb-3">
        <label class="form-label">班級名稱 (例如: 202-A)</label>
        <input type="text" id="className" class="form-control" placeholder="請輸入班名">
      </div>

      <div class="mb-3">
        <label class="form-label">選擇等級 (Level / Unit)</label>
        <select id="targetLevel" class="form-select">
          <option value="L1U1">Level 1 - Unit 1</option>
          <option value="L1U2">Level 1 - Unit 2</option>
          <option value="L2U1">Level 2 - Unit 1</option>
          </select>
      </div>

      <div class="mb-3">
        <label class="form-label">開課日期</label>
        <input type="date" id="startDate" class="form-control">
      </div>

      <div class="mb-3">
        <label class="form-label">上課頻率</label>
        <div class="form-check">
          <input class="form-check-input day-check" type="checkbox" value="1" checked> <label>週一</label>
        </div>
        <div class="form-check">
          <input class="form-check-input day-check" type="checkbox" value="3" checked> <label>週三</label>
        </div>
        <div class="form-check">
          <input class="form-check-input day-check" type="checkbox" value="5" checked> <label>週五</label>
        </div>
      </div>

      <div class="d-grid gap-2 mt-4">
        <button class="btn btn-outline-primary" onclick="previewSchedule()">🔍 預覽課表日期</button>
        <button id="btnCreate" class="btn btn-danger" onclick="confirmAndCreate()" disabled>✅ 確認日期並正式建立</button>
      </div>
    </div>

    <div class="col-md-8 preview-container">
      <div class="card p-3">
        <h5>📅 課表校對區</h5>
        <hr>
        <div id="previewResult">
          <p class="text-muted">請先在左側填寫資料並點擊「預覽課表日期」。</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // 1. 預覽功能
  function previewSchedule() {
    const params = {
      className: document.getElementById('className').value,
      targetLevel: document.getElementById('targetLevel').value,
      startDate: document.getElementById('startDate').value,
      daysInput: Array.from(document.querySelectorAll('.day-check:checked')).map(cb => cb.value).join('')
    };

    if (!params.className || !params.startDate || !params.daysInput) {
      alert("請填寫完整資訊");
      return;
    }

    showLoading(true);
    google.script.run
      .withSuccessHandler(showPreviewTable)
      .withFailureHandler(onFail)
      .getPreviewSchedule(params); // 呼叫 Scheduler.gs 的函式
  }

  // 2. 顯示預覽表格
  function showPreviewTable(data) {
    showLoading(false);
    if (!data || data.length === 0) {
      document.getElementById('previewResult').innerHTML = '<div class="alert alert-warning">找不到對應規格</div>';
      return;
    }

    let html = `
      <div class="alert alert-info">預計總堂數：${data.length} 堂 | 預計結業日：${data[data.length-1].date}</div>
      <table class="table table-hover table-preview">
        <thead class="table-light">
          <tr><th>堂數</th><th>單元</th><th>日期 (星期)</th><th>負責老師</th><th>備註</th></tr>
        </thead>
        <tbody>`;
    
    data.forEach(item => {
      let rowClass = item.isExam ? 'is-exam' : '';
      html += `
        <tr class="${rowClass}">
          <td>L${item.lessonNum}</td>
          <td>${item.unit}</td>
          <td>${item.date}</td>
          <td>${item.teacher}</td>
          <td>${item.isExam ? '📝 測驗' : ''}</td>
        </tr>`;
    });

    html += `</tbody></table>`;
    document.getElementById('previewResult').innerHTML = html;
    document.getElementById('btnCreate').disabled = false; // 開啟正式建立按鈕
  }

  // 3. 正式建立班級
  function confirmAndCreate() {
    if (!confirm("確定日期與規格無誤，要正式建立班級分頁嗎？")) return;
    
    showLoading(true);
    const params = {
      className: document.getElementById('className').value,
      targetLevel: document.getElementById('targetLevel').value,
      startDate: document.getElementById('startDate').value,
      daysInput: Array.from(document.querySelectorAll('.day-check:checked')).map(cb => cb.value).join('')
    };

    // 這裡呼叫你原本在 Main.gs 的建立班級函式
    google.script.run
      .withSuccessHandler(res => {
        showLoading(false);
        alert("✅ 班級建立成功！");
      })
      .withFailureHandler(onFail)
      .createClassSheet(params); 
  }

  function showLoading(show) {
    document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
  }

  function onFail(err) {
    showLoading(false);
    alert("發生錯誤：" + err.message);
  }
</script>

</body>
</html>
