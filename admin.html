<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewCore Admin — 管理後台</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
<style>
  :root {
    --bg:       #0f0f11;
    --surface:  #1a1a1f;
    --border:   #2a2a32;
    --accent:   #e8ff47;
    --accent2:  #47c8ff;
    --danger:   #ff4757;
    --success:  #2ed573;
    --muted:    #555566;
    --text:     #e8e8f0;
    --text-dim: #888899;
    --radius:   10px;
    --mono:     'DM Mono', monospace;
    --sans:     'Noto Sans TC', sans-serif;
    --display:  'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; gap: 16px; flex-wrap: wrap; }
  .logo { font-family: var(--display); font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; color: var(--accent); white-space: nowrap; }
  .logo span { color: var(--text-dim); font-weight: 700; }
  .auth-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .auth-bar input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 0.8rem; padding: 7px 12px; width: 140px; outline: none; transition: border-color .2s; }
  .auth-bar input:focus { border-color: var(--accent); }
  .btn-sm { background: var(--accent); color: #000; border: none; border-radius: 6px; font-family: var(--sans); font-size: 0.8rem; font-weight: 700; padding: 7px 16px; cursor: pointer; transition: opacity .15s; white-space: nowrap; }
  .btn-sm:hover { opacity: .85; }
  .btn-sm.outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .btn-sm.outline:hover { border-color: var(--accent2); color: var(--accent2); }
  .auth-status { font-size: 0.78rem; color: var(--text-dim); font-family: var(--mono); white-space: nowrap; }
  .auth-status.ok   { color: var(--accent); }
  .auth-status.fail { color: var(--danger); }
  .client-badge { display: none; align-items: center; gap: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; font-family: var(--mono); font-size: 0.75rem; color: var(--accent2); }
  .client-badge.visible { display: flex; }
  .client-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }

  .tab-bar { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--surface); padding: 0 32px; }
  .tab-btn { font-family: var(--mono); font-size: 0.78rem; padding: 12px 20px; color: var(--text-dim); border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; letter-spacing: .04em; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; flex: 1; }
  .tab-content.active { display: flex; }

  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .overlay.visible { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 480px; max-width: 90vw; display: flex; flex-direction: column; gap: 20px; animation: modalIn .25s cubic-bezier(.34,1.56,.64,1); max-height: 80vh; overflow-y: auto; }
  @keyframes modalIn { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-title { font-family: var(--display); font-size: 1.1rem; font-weight: 800; color: var(--text); }
  .client-list { display: flex; flex-direction: column; gap: 8px; }
  .client-item { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: all .15s; gap: 12px; }
  .client-item:hover { border-color: var(--accent); }
  .client-item.selected { border-color: var(--accent); background: rgba(232,255,71,.05); }
  .client-item-name { font-size: 0.9rem; font-weight: 500; color: var(--text); }
  .client-item-meta { font-family: var(--mono); font-size: 0.68rem; color: var(--text-dim); margin-top: 3px; }
  .client-item-valid { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .client-check { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #000; transition: all .15s; }
  .client-item.selected .client-check { background: var(--accent); border-color: var(--accent); }
  .client-item.selected .client-check::after { content: '✓'; }
  .btn-confirm { width: 100%; background: var(--accent); border: none; border-radius: var(--radius); color: #000; font-family: var(--display); font-size: 0.95rem; font-weight: 800; padding: 13px; cursor: pointer; transition: opacity .15s; }
  .btn-confirm:hover { opacity: .85; }
  .btn-confirm:disabled { opacity: .35; cursor: not-allowed; }

  .panel-left { background: var(--surface); border-right: 1px solid var(--border); padding: 28px 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 22px; width: 380px; flex-shrink: 0; }
  .panel-right { padding: 28px 32px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; flex: 1; min-height: 0; }

  .section-title { font-family: var(--mono); font-size: 0.68rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .field-group { display: flex; flex-direction: column; gap: 14px; }
  .field label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 5px; font-family: var(--mono); }
  .field input, .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--sans); font-size: 0.88rem; padding: 10px 12px; outline: none; transition: border-color .2s; appearance: none; }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field select option { background: var(--surface); }

  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .day-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text-dim); font-family: var(--mono); font-size: 0.75rem; padding: 8px 0; text-align: center; cursor: pointer; transition: all .15s; user-select: none; }
  .day-btn:hover { border-color: var(--accent); color: var(--accent); }
  .day-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }

  .teacher-rows { display: flex; flex-direction: column; gap: 7px; margin-top: 4px; }
  .teacher-row { display: flex; align-items: center; gap: 8px; }
  .day-label { font-family: var(--mono); font-size: 0.75rem; color: var(--accent); background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 6px 10px; min-width: 38px; text-align: center; flex-shrink: 0; }
  .teacher-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--sans); font-size: 0.82rem; padding: 8px 12px; outline: none; transition: border-color .2s; }
  .teacher-row input:focus { border-color: var(--accent); }

  .spec-summary { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; font-family: var(--mono); font-size: 0.78rem; color: var(--text-dim); line-height: 1.8; }
  .spec-summary strong { color: var(--accent); font-weight: 500; }
  .unit-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .unit-pill { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; font-family: var(--mono); font-size: 0.68rem; padding: 2px 7px; color: var(--text-dim); }
  .unit-pill.exam { border-color: var(--accent2); color: var(--accent2); }

  .divider { height: 1px; background: var(--border); }

  .btn-preview { width: 100%; background: transparent; border: 1px solid var(--accent); border-radius: var(--radius); color: var(--accent); font-family: var(--display); font-size: 0.95rem; font-weight: 700; padding: 12px; cursor: pointer; transition: all .15s; }
  .btn-preview:hover { background: var(--accent); color: #000; }
  .btn-preview:disabled { opacity: .35; cursor: not-allowed; }
  .btn-create { width: 100%; background: var(--accent); border: none; border-radius: var(--radius); color: #000; font-family: var(--display); font-size: 0.95rem; font-weight: 800; padding: 14px; cursor: pointer; transition: opacity .15s; display: none; }
  .btn-create:hover { opacity: .85; }
  .btn-create:disabled { opacity: .35; cursor: not-allowed; }
  .btn-create.visible { display: block; }

  .stats-bar { display: flex; gap: 16px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 20px; flex: 1; min-width: 120px; }
  .stat-card .val { font-family: var(--display); font-size: 1.6rem; font-weight: 800; color: var(--accent); line-height: 1; }
  .stat-card .lbl { font-family: var(--mono); font-size: 0.68rem; color: var(--text-dim); margin-top: 4px; letter-spacing: .06em; text-transform: uppercase; }
  .stat-card.holiday .val { color: var(--danger); }
  .stat-card.end .val { color: var(--accent2); font-size: 1rem; margin-top: 4px; }

  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .table-header { display: grid; grid-template-columns: 60px 110px 50px 80px 1fr 1fr; padding: 10px 16px; background: var(--bg); border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 0.68rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); gap: 8px; }
  .schedule-body { max-height: 280px; overflow-y: auto; }
  .schedule-row { display: grid; grid-template-columns: 60px 110px 50px 80px 1fr 1fr; padding: 10px 16px; border-bottom: 1px solid var(--border); align-items: center; gap: 8px; transition: background .1s; font-size: 0.85rem; }
  .schedule-row:last-child { border-bottom: none; }
  .schedule-row:hover { background: rgba(255,255,255,.03); }
  .schedule-row.holiday { background: rgba(255,71,87,.06); }
  .lesson-num { font-family: var(--mono); font-size: 0.78rem; color: var(--text-dim); font-weight: 500; }
  .lesson-num.active { color: var(--accent); }
  .date-cell { font-family: var(--mono); font-size: 0.82rem; color: var(--text); }
  .weekday-badge { font-family: var(--mono); font-size: 0.72rem; padding: 2px 7px; border-radius: 4px; background: var(--bg); border: 1px solid var(--border); color: var(--text-dim); text-align: center; }
  .unit-badge { font-family: var(--mono); font-size: 0.75rem; padding: 3px 8px; border-radius: 4px; background: rgba(232,255,71,.08); border: 1px solid rgba(232,255,71,.2); color: var(--accent); display: inline-block; }
  .unit-badge.exam-badge { background: rgba(71,200,255,.08); border-color: rgba(71,200,255,.2); color: var(--accent2); }
  .teacher-cell { font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim); }
  .holiday-tag { font-family: var(--mono); font-size: 0.72rem; color: var(--danger); display: flex; align-items: center; gap: 5px; }
  .holiday-tag::before { content: '✕'; font-size: 0.65rem; }

  .teacher-mgmt { padding: 28px 32px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
  .teacher-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .teacher-toolbar h2 { font-family: var(--display); font-size: 1rem; font-weight: 800; }
  .teacher-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .teacher-table-header { display: grid; grid-template-columns: 140px 120px 90px 1fr 120px; padding: 10px 16px; background: var(--bg); border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 0.68rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); gap: 8px; }
  .teacher-row-item { display: grid; grid-template-columns: 140px 120px 90px 1fr 120px; padding: 12px 16px; border-bottom: 1px solid var(--border); align-items: center; gap: 8px; transition: background .1s; }
  .teacher-row-item:last-child { border-bottom: none; }
  .teacher-row-item:hover { background: rgba(255,255,255,.03); }
  .role-badge { font-family: var(--mono); font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; display: inline-block; }
  .role-badge.admin { background: rgba(232,255,71,.1); border: 1px solid rgba(232,255,71,.3); color: var(--accent); }
  .role-badge.teacher { background: rgba(71,200,255,.1); border: 1px solid rgba(71,200,255,.3); color: var(--accent2); }
  .role-badge.superadmin { background: rgba(255,71,87,.1); border: 1px solid rgba(255,71,87,.3); color: var(--danger); }
  .auth-code-cell { font-family: var(--mono); font-size: 0.8rem; color: var(--text); }
  .temp-class-cell { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); }
  .action-btns { display: flex; gap: 6px; }
  .btn-del { background: transparent; border: 1px solid var(--border); border-radius: 5px; color: var(--text-dim); font-family: var(--mono); font-size: 0.7rem; padding: 4px 10px; cursor: pointer; transition: all .15s; }
  .btn-del:hover { border-color: var(--danger); color: var(--danger); }

  .add-teacher-form { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
  .form-title { font-family: var(--mono); font-size: 0.72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .form-field label { display: block; font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); margin-bottom: 5px; }
  .form-field input, .form-field select { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 0.85rem; padding: 9px 12px; outline: none; transition: border-color .2s; appearance: none; }
  .form-field input:focus, .form-field select:focus { border-color: var(--accent); }
  .form-field select option { background: var(--surface); }
  .btn-add-teacher { background: var(--accent); border: none; border-radius: var(--radius); color: #000; font-family: var(--display); font-size: 0.88rem; font-weight: 800; padding: 11px 24px; cursor: pointer; transition: opacity .15s; align-self: flex-end; }
  .btn-add-teacher:hover { opacity: .85; }
  .btn-add-teacher:disabled { opacity: .35; cursor: not-allowed; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; color: var(--muted); font-family: var(--mono); font-size: 0.85rem; text-align: center; padding: 60px; }
  .empty-icon { font-size: 2.5rem; opacity: .4; }
  .loading { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-family: var(--mono); font-size: 0.82rem; padding: 40px; justify-content: center; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 18px; font-family: var(--mono); font-size: 0.8rem; color: var(--text); box-shadow: 0 8px 32px rgba(0,0,0,.4); transform: translateY(80px); opacity: 0; transition: all .3s cubic-bezier(.34,1.56,.64,1); z-index: 999; max-width: 320px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.ok  { border-color: var(--accent); color: var(--accent); }
  .toast.err { border-color: var(--danger); color: var(--danger); }

  /* Roster */
  .roster-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .roster-hdr { padding: 13px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .roster-hdr-title { font-family: var(--mono); font-size: 0.72rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--accent2); }
  .roster-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); }
  .roster-tab-btn { font-family: var(--mono); font-size: 0.72rem; padding: 9px 16px; color: var(--text-dim); border: none; background: transparent; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; letter-spacing: .04em; }
  .roster-tab-btn:hover { color: var(--text); }
  .roster-tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }
  .roster-pane { display: none; padding: 16px 20px; }
  .roster-pane.active { display: block; }
  .stu-list { display: flex; flex-direction: column; gap: 5px; max-height: 220px; overflow-y: auto; }
  .stu-item { display: flex; align-items: center; gap: 10px; padding: 7px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; cursor: pointer; transition: all .15s; user-select: none; }
  .stu-item:hover { border-color: var(--accent2); }
  .stu-item.on { border-color: var(--accent2); background: rgba(71,200,255,.05); }
  .stu-item input[type=checkbox] { accent-color: var(--accent2); width: 14px; height: 14px; flex-shrink: 0; cursor: pointer; }
  .stu-cn { font-size: 0.88rem; color: var(--text); min-width: 78px; }
  .stu-en { font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim); min-width: 78px; }
  .stu-grade { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); min-width: 36px; }
  .stu-cls { font-family: var(--mono); font-size: 0.65rem; color: var(--accent); background: rgba(232,255,71,.08); border: 1px solid rgba(232,255,71,.2); border-radius: 3px; padding: 1px 6px; }
  .btn-sel-all { background: transparent; border: 1px solid var(--border); border-radius: 5px; color: var(--text-dim); font-family: var(--mono); font-size: 0.68rem; padding: 4px 10px; cursor: pointer; transition: all .15s; }
  .btn-sel-all:hover { border-color: var(--accent2); color: var(--accent2); }
  .stu-tbl { width: 100%; border-collapse: collapse; }
  .stu-tbl th { text-align: left; padding: 5px 7px; font-family: var(--mono); font-size: 0.65rem; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .stu-tbl td { padding: 3px 2px; border-bottom: 1px solid rgba(42,42,50,.5); }
  .stu-tbl td:last-child { width: 28px; }
  .stu-tbl input { width: 100%; background: transparent; border: 1px solid transparent; border-radius: 4px; color: var(--text); font-family: var(--sans); font-size: 0.82rem; padding: 5px 7px; outline: none; transition: border-color .15s; min-width: 56px; }
  .stu-tbl input:focus { border-color: var(--accent); background: var(--bg); }
  .del-row { background: transparent; border: none; color: var(--muted); font-size: 0.78rem; cursor: pointer; padding: 4px 6px; border-radius: 3px; transition: color .15s; }
  .del-row:hover { color: var(--danger); }
  .btn-add-row { background: transparent; border: 1px dashed var(--border); border-radius: var(--radius); color: var(--text-dim); font-family: var(--mono); font-size: 0.72rem; padding: 7px 14px; cursor: pointer; margin-top: 10px; transition: all .15s; }
  .btn-add-row:hover { border-color: var(--accent2); color: var(--accent2); }
  .gem-zone { border: 2px dashed var(--border); border-radius: var(--radius); padding: 26px; text-align: center; cursor: pointer; transition: border-color .2s; position: relative; overflow: hidden; }
  .gem-zone:hover { border-color: var(--accent2); }
  .gem-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .gem-zone-icon { font-size: 1.8rem; opacity: .4; margin-bottom: 7px; }
  .gem-zone-txt { font-family: var(--mono); font-size: 0.75rem; color: var(--text-dim); line-height: 1.6; }
  .gem-zone-txt strong { color: var(--accent2); }
  .gem-img-preview { max-width: 100%; max-height: 150px; border-radius: 7px; border: 1px solid var(--border); margin-top: 10px; object-fit: contain; display: none; }
  .btn-ocr { width: 100%; background: rgba(71,200,255,.1); border: 1px solid rgba(71,200,255,.3); border-radius: var(--radius); color: var(--accent2); font-family: var(--display); font-size: 0.88rem; font-weight: 700; padding: 10px 20px; cursor: pointer; transition: all .15s; margin-top: 10px; }
  .btn-ocr:hover { background: rgba(71,200,255,.2); }
  .btn-ocr:disabled { opacity: .4; cursor: not-allowed; }
  .gem-status { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); margin-top: 8px; min-height: 18px; }
  .file-type-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; justify-content: center; }
  .file-type-tag { font-family: var(--mono); font-size: 0.6rem; padding: 1px 6px; border-radius: 3px; border: 1px solid var(--border); color: var(--text-dim); }

<script>
// ── 兩個 GAS 端點 ──
// 授權中心：verifyMasterAuth, getMasterClients, getAvailableSpecs
const BRAIN_URL = 'https://script.google.com/macros/s/AKfycbyF9mEn3_pijcuQaZgGI1gug1Pxrrh3c7WhBHMHLvMdLk00dkpPfKc0bvsLUlDfRhF8/exec';
// 客戶端：getPreviewSchedule, createClassSheet, getTeachers, saveTeacher, deleteTeacher 等
const GAS_URL   = 'https://script.google.com/macros/s/AKfycbxE7aSryLEDxBqi-28EpdjvK9lhQwvGMKnWJlCbcHIG9Rc6FEPN3UrZwSIqMNVJ1GPs/exec';
const GATEWAY_URL   = 'https://script.google.com/macros/s/AKfycbz0O6eB9fVC3Xp7g0Kt4U-32Inmf9ieDYJygEf3jW78xaWx10glPscEefEQwgB0jCioug/exec';
const GATEWAY_TOKEN = 'MYVIEWBOARDgoogleAPI';
const DAY_NAMES      = {'1':'一','2':'二','3':'三','4':'四','5':'五','6':'六','7':'日'};
const WEEKDAY_TO_NUM = {'一':'1','二':'2','三':'3','四':'4','五':'5','六':'6','日':'7'};

let authCode        = '';
let userRole        = '';
let specsData       = [];
let selectedDays    = '';
let currentSchedule = null;
let currentSpec     = null;
let clientsData     = [];
let selectedClient  = null;
let pendingClient   = null;
let rosterSelectStudents = [];
let geminiKey            = null;
let geminiFileBase64     = null;
let geminiFileMime       = null;
let geminiFileText       = null;

// ── 授權中心 JSONP ──
function callBrain(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    window[cbName] = data => { resolve(data); delete window[cbName]; script.remove(); };
    const qs = Object.entries({ ...params, callback: cbName })
      .map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
    script.src = `${BRAIN_URL}?${qs}`;
    script.onerror = () => reject(new Error('Brain network error'));
    document.body.appendChild(script);
  });
}

// ── 客戶端 JSONP ──
function callGAS(params) {
  return new Promise((resolve, reject) => {
    const cbName = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    window[cbName] = data => { resolve(data); delete window[cbName]; script.remove(); };
    const qs = Object.entries({ ...params, callback: cbName })
      .map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
    script.src = `${GAS_URL}?${qs}`;
    script.onerror = () => reject(new Error('Network error'));
    document.body.appendChild(script);
  });
}

// ── 客戶端 POST ──
async function postGAS(payload) {
  const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
  return await res.json();
}

// ── Toast ──
function toast(msg, type='ok', dur=3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => el.className = 'toast', dur);
}

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['build','teachers'][i] === tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'teachers' && selectedClient) loadTeachers();
}

// ── Login → 走授權中心 ──
async function doLogin() {
  const code = document.getElementById('authInput').value.trim();
  if (!code) return toast('請輸入授權碼', 'err');
  const statusEl = document.getElementById('authStatus');
  statusEl.textContent = '驗證中…'; statusEl.className = 'auth-status';
  try {
    const res = await callBrain({ action: 'verifyMasterAuth', authCode: code });
    if (res.ok) {
      authCode = code; userRole = res.role;
      statusEl.textContent = `✓ ${res.name} (${res.role})`;
      statusEl.className = 'auth-status ok';
      document.getElementById('tabBar').style.display = 'flex';
      await loadAndShowClientModal();
    } else {
      statusEl.textContent = '✕ ' + (res.msg || '驗證失敗');
      statusEl.className = 'auth-status fail';
    }
  } catch(e) {
    statusEl.textContent = '✕ 連線失敗'; statusEl.className = 'auth-status fail';
  }
}

// ── Client Modal → 走授權中心 ──
async function loadAndShowClientModal() {
  document.getElementById('clientOverlay').classList.add('visible');
  const listEl = document.getElementById('clientList');
  listEl.innerHTML = `<div class="loading"><div class="spinner"></div>載入補習班清單…</div>`;
  document.getElementById('btnConfirmClient').disabled = true;
  pendingClient = null;
  try {
    const res = await callBrain({ action: 'getMasterClients', authCode: authCode });
    if (!res.ok) {
      listEl.innerHTML = `<div style="color:var(--danger);padding:12px;font-family:var(--mono);font-size:.8rem">${res.msg||'載入失敗'}</div>`;
      return;
    }
    clientsData = res.clients;
    listEl.innerHTML = '';
    if (!clientsData || !clientsData.length) {
      listEl.innerHTML = `<div style="color:var(--muted);padding:12px;font-family:var(--mono);font-size:.8rem">沒有可用的補習班</div>`;
      return;
    }
    clientsData.forEach(c => {
      const div = document.createElement('div');
      div.className = 'client-item' + (selectedClient && selectedClient.sheetId === c.sheetId ? ' selected' : '');
      div.innerHTML = `
        <div style="flex:1;min-width:0">
          <div class="client-item-name">${c.name}</div>
          <div class="client-item-meta">${c.sheetId.slice(0,24)}…</div>
        </div>
        <div class="client-item-valid">到期 ${c.validTo}</div>
        <div class="client-check"></div>
      `;
      div.onclick = () => {
        document.querySelectorAll('.client-item').forEach(i => i.classList.remove('selected'));
        div.classList.add('selected');
        pendingClient = c;
        document.getElementById('btnConfirmClient').disabled = false;
      };
      listEl.appendChild(div);
    });
  } catch(e) {
    listEl.innerHTML = `<div style="color:var(--danger);padding:12px;font-family:var(--mono);font-size:.8rem">連線失敗：${e.message}</div>`;
  }
}

async function confirmClient() {
  if (!pendingClient) return;
  selectedClient = pendingClient;
  document.getElementById('clientOverlay').classList.remove('visible');
  document.getElementById('clientBadgeName').textContent = selectedClient.name;
  document.getElementById('clientBadge').classList.add('visible');
  document.getElementById('btnSwitchClient').style.display = 'flex';
  toast(`已切換至：${selectedClient.name} ✓`);

  // ── 檢查方案並套用限制 ──
  try {
    const lic = await callBrain({ action: 'checkLicense', sheetId: selectedClient.sheetId });
    applyPlanRestrictions(lic.valid ? (lic.plan || 'Free') : 'Free', lic.classLimit || 3);
  } catch(e) {
    console.warn('checkLicense failed', e);
    applyPlanRestrictions('Free', 3);
  }

  await loadSpecs();
}
  // ── 方案限制 ──
function applyPlanRestrictions(plan, classLimit) {
  const oldTag = document.getElementById('planLimitTag');
  if (oldTag) oldTag.remove();
  const btnPreview = document.getElementById('btnPreview');
  const btnCreate  = document.getElementById('btnCreate');

  if (plan === 'Free') {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      if (btn.textContent.includes('建班')) btn.style.display = 'none';
    });
    const pr = document.getElementById('panelRight');
    if (pr) pr.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
        height:100%;padding:3rem;text-align:center;gap:1.2rem;">
        <div style="font-size:3.5rem;">🔒</div>
        <div style="font-family:var(--mono);color:var(--accent);font-size:1.1rem;font-weight:700;letter-spacing:.04em;">
          免費版不包含建班功能
        </div>
        <div style="color:var(--text-dim);font-size:0.85rem;line-height:1.8;max-width:320px;">
          免費版由 Jeffrey 老師協助建立班級（最多 3 班）<br>
          如需自行管理建班，請升級至標準方案
        </div>
        <a href="https://jeffreycz1979-prog.github.io/JeffreysLab/index.html#pricing"
           target="_blank"
           style="display:inline-block;margin-top:0.5rem;background:var(--accent);color:#000;
             padding:0.75rem 2rem;border-radius:100px;font-weight:700;font-size:0.9rem;
             text-decoration:none;font-family:var(--display);">
          查看升級方案 →
        </a>
      </div>`;
    if (btnPreview) { btnPreview.disabled = true; btnPreview.title = '免費版不可使用'; }
    if (btnCreate)  { btnCreate.disabled  = true; btnCreate.title  = '免費版不可使用'; }
    toast('免費版不包含建班功能，班級由 Jeffrey 老師協助建立', 'err', 6000);
    return;
  }

  const badge = document.getElementById('clientBadge');
  if (badge) {
    const tag = document.createElement('span');
    tag.id = 'planLimitTag';
    tag.style.cssText = 'font-size:0.68rem;background:rgba(232,255,71,0.12);color:var(--accent);' +
      'padding:2px 9px;border-radius:100px;font-family:var(--mono);border:1px solid rgba(232,255,71,0.25);margin-left:4px;';
    tag.textContent = plan === 'Pro' ? 'Pro · 無限班級' : `Standard · 最多 ${classLimit} 班`;
    badge.appendChild(tag);
  }

  if (plan === 'Standard') {
    const limit = classLimit || 10;
    if (!window._origDoCreate) window._origDoCreate = doCreate;
    window.doCreate = async function() {
      try {
        const res = await callGAS({ action: 'getClassCount', sheetId: selectedClient.sheetId });
        const count = parseInt(res.count) || 0;
        if (count >= limit) {
          toast(`已達 ${limit} 班上限！請聯繫 Jeffrey 升級至 Pro 方案。`, 'err', 7000);
          const btn = document.getElementById('btnCreate');
          if (btn) { btn.disabled = true; btn.textContent = `⚠ 已達 ${limit} 班上限`; }
          return;
        }
      } catch(e) {
        console.warn('getClassCount 失敗，允許繼續', e);
      }
      return window._origDoCreate.apply(this, arguments);
    };
  }
  // Pro → 無限制
}

// ── Load Specs → 走授權中心（已有 getAvailableSpecs）──
async function loadSpecs() {
  const sel = document.getElementById('specSelect');
  sel.innerHTML = '<option value="">載入規格中…</option>';
  specsData = []; currentSpec = null;
  try {
    const res = await callBrain({ action: 'getAvailableSpecs', sheetId: selectedClient.sheetId });
    if (!res.ok) return toast('無法載入規格：' + (res.msg||''), 'err');
    specsData = res.specs;
    sel.innerHTML = '<option value="">— 選擇規格 —</option>';
    specsData.forEach((sp, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${sp.displayName}（${sp.totalLessons} 堂）`;
      sel.appendChild(opt);
    });
    toast('規格載入完成 ✓');
  } catch(e) {
    toast('載入規格失敗', 'err');
    sel.innerHTML = '<option value="">— 載入失敗 —</option>';
  }
}

function onSpecChange() {
  const idx = document.getElementById('specSelect').value;
  const wrapEl = document.getElementById('specSummaryWrap');
  if (idx === '') { wrapEl.style.display = 'none'; currentSpec = null; return; }
  currentSpec = specsData[parseInt(idx)];
  wrapEl.style.display = 'block';
  const pills = currentSpec.units.map(u => {
    const isExam = /^(R|Ac|Ho|Review|GP|FP|Maker|Activity)/i.test(u.unit);
    return `<span class="unit-pill ${isExam?'exam':''}">${u.unit} ×${u.lessons}</span>`;
  }).join('');
  document.getElementById('specSummaryContent').innerHTML = `
    <strong>${currentSpec.displayName}</strong> &nbsp;·&nbsp; 共 <strong>${currentSpec.totalLessons}</strong> 堂
    <div class="unit-pills">${pills}</div>
  `;
}

function toggleDay(el) {
  el.classList.toggle('active');
  selectedDays = [...document.querySelectorAll('.day-btn.active')].map(e=>e.dataset.day).sort().join('');
  renderTeacherInputs();
}

function renderTeacherInputs() {
  const container = document.getElementById('teacherRows');
  const activeDays = [...document.querySelectorAll('.day-btn.active')].map(e=>e.dataset.day).sort();
  const existing = {};
  container.querySelectorAll('input[data-day]').forEach(inp => { existing[inp.dataset.day] = inp.value; });
  container.innerHTML = '';
  if (!activeDays.length) {
    container.innerHTML = `<div style="font-family:var(--mono);font-size:0.72rem;color:var(--muted)">請先選擇上課星期 ↑</div>`;
    return;
  }
  activeDays.forEach(day => {
    const row = document.createElement('div');
    row.className = 'teacher-row';
    const inp = document.createElement('input');
    inp.type = 'text'; inp.dataset.day = day;
    inp.placeholder = '外師/中師，如 Jeffrey/Sandy';
    inp.value = existing[day] || '';
    inp.addEventListener('focus', () => inp.style.borderColor = 'var(--accent)');
    inp.addEventListener('blur',  () => inp.style.borderColor = 'var(--border)');
    row.innerHTML = `<span class="day-label">週${DAY_NAMES[day]}</span>`;
    row.appendChild(inp);
    container.appendChild(row);
  });
}

function buildDayTeacherMap() {
  const map = {};
  document.querySelectorAll('#teacherRows input[data-day]').forEach(inp => {
    if (inp.value.trim()) map[inp.dataset.day] = inp.value.trim();
  });
  return map;
}

// ── Preview → 走客戶端 GAS ──
async function doPreview() {
  if (!selectedClient) return toast('請先選擇補習班', 'err');
  const startDate = document.getElementById('startDate').value;
  if (!startDate)    return toast('請選擇開始日期', 'err');
  if (!selectedDays) return toast('請選擇上課星期', 'err');
  if (!currentSpec)  return toast('請選擇課程規格', 'err');

  const pr = document.getElementById('panelRight');
  pr.innerHTML = `<div class="loading"><div class="spinner"></div>計算課表中…</div>`;
  document.getElementById('btnPreview').disabled = true;
  try {
    const res = await callGAS({
      action: 'getPreviewSchedule', startDate, days: selectedDays,
      lessons: currentSpec.totalLessons, sheetId: selectedClient.sheetId, teacher: ''
    });
    document.getElementById('btnPreview').disabled = false;

function addManualRow(preset = {}) {
  const tbody = document.getElementById('manualTbody');
  if (!tbody) return;
  const fields = [
    { key:'name', ph:'王小明' }, { key:'enName', ph:'Timmy' },
    { key:'grade', ph:'G3' }, { key:'phone', ph:'0912345678' }, { key:'note', ph:'家長Email' }
  ];
  const tr = document.createElement('tr');
  fields.forEach((f, fi) => {
    const td = document.createElement('td');
    const inp = document.createElement('input');
    inp.type = 'text'; inp.placeholder = f.ph; inp.dataset.field = f.key;
    inp.value = preset[f.key] || '';
    inp.addEventListener('input', updateRosterCount);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Tab' && !e.shiftKey && fi === fields.length - 1) {
        e.preventDefault(); addManualRow();
        setTimeout(() => document.querySelector('#manualTbody tr:last-child input')?.focus(), 10);
      }

  tr.appendChild(delTd); tbody.appendChild(tr);

function onGeminiFileSelect(e) {
  const file = e.target.files[0]; if (!file) return;
  geminiFileBase64 = null; geminiFileMime = null; geminiFileText = null;
  const img = document.getElementById('gemPreview');
  const fileNameEl = document.getElementById('gemFileName');
  const statusEl = document.getElementById('gemStatus');
  const zone = document.getElementById('gemZone');
  const btn = document.getElementById('btnOCR');
  if (statusEl) { statusEl.style.color = 'var(--text-dim)'; statusEl.textContent = ''; }
  const ext = file.name.split('.').pop().toLowerCase();
  const isImage = file.type.startsWith('image/');
  const isPDF   = file.type === 'application/pdf' || ext === 'pdf';
  const isExcel = ['xlsx','xls'].includes(ext);
  const isWord  = ['docx','doc'].includes(ext);
  function markReady(label) {
    if (zone) zone.style.borderColor = 'var(--accent2)';
    if (fileNameEl) { fileNameEl.textContent = label; fileNameEl.style.display = 'block'; }
    btn.disabled = false;
  }
  if (isImage) {
    const reader = new FileReader();
    reader.onload = ev => {
      const dataUrl = ev.target.result;
      geminiFileBase64 = dataUrl.split(',')[1]; geminiFileMime = file.type;
      img.src = dataUrl; img.style.display = 'block';
      if (fileNameEl) fileNameEl.style.display = 'none';
      if (zone) zone.style.borderColor = 'var(--accent2)';
      btn.disabled = false;
    };
    reader.readAsDataURL(file);
  } else if (isPDF) {
    img.style.display = 'none';
    const reader = new FileReader();
    reader.onload = ev => {
      geminiFileBase64 = btoa(String.fromCharCode(...new Uint8Array(ev.target.result)));
      geminiFileMime = 'application/pdf'; markReady('📄 ' + file.name);
    };
    reader.readAsArrayBuffer(file);
  } else if (isExcel) {
    img.style.display = 'none';
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb = XLSX.read(new Uint8Array(ev.target.result), { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        geminiFileText = XLSX.utils.sheet_to_csv(ws); markReady('📊 ' + file.name);
      } catch(err) {
        if (statusEl) { statusEl.style.color = 'var(--danger)'; statusEl.textContent = '讀取 Excel 失敗：' + err.message; }
      }
    };
    reader.readAsArrayBuffer(file);
  } else if (isWord) {
    img.style.display = 'none';
    const reader = new FileReader();
    reader.onload = ev => {
      mammoth.extractRawText({ arrayBuffer: ev.target.result })
        .then(result => { geminiFileText = result.value; markReady('📝 ' + file.name); })
        .catch(err => {
          if (statusEl) { statusEl.style.color = 'var(--danger)'; statusEl.textContent = '讀取 Word 失敗：' + err.message; }
        });
    };
    reader.readAsArrayBuffer(file);
  }
}

async function runGeminiOCR() {
  if (!geminiFileBase64 && !geminiFileText) return;
  const btn = document.getElementById('btnOCR');
  const status = document.getElementById('gemStatus');
  btn.disabled = true; btn.textContent = '辨識中…';
  status.style.color = 'var(--text-dim)'; status.textContent = '辨識中…';
  try {
    const prompt = '以下是學生名單資料，請辨識所有學生並以JSON陣列回傳，每筆物件包含：name（中文姓名）、enName（英文姓名，無則空字串）、grade（年級如G3，無則空字串）、phone（電話，無則空字串）、note（備註，無則空字串）。只回傳JSON陣列，不要其他文字。';
    const resp = await fetch(GATEWAY_URL, {
      method: 'POST',
      redirect: 'follow',
      body: JSON.stringify({
        auth:   GATEWAY_TOKEN,
        action: 'generate_text',
        params: {
          prompt:    geminiFileText ? prompt + '\n\n資料內容：\n' + geminiFileText : prompt,
          audioData: geminiFileBase64 ? { mimeType: geminiFileMime, data: geminiFileBase64 } : null,
          useFreeKey: true,
          useLite:    false
        }
      })
    });
    const gwResult = await resp.json();
    if (!gwResult.ok) throw new Error(gwResult.error || 'Gateway 失敗');
    const text = gwResult.text || '';
    const m = text.match(/\[[\s\S]*\]/);
    if (!m) throw new Error('無法從回應中解析學生資料');
    const students = JSON.parse(m[0]);
    status.style.color = 'var(--success)'; status.textContent = `✓ 辨識 ${students.length} 位，已填入手動輸入`;
    switchRosterTab('manual');
    students.forEach(s => addManualRow(s));
    updateRosterCount();
    toast(`Gemini 辨識完成：${students.length} 位學生`, 'ok');
  } catch(e) {
    status.style.color = 'var(--danger)'; status.textContent = '辨識失敗：' + e.message;
  }
  btn.disabled = false; btn.textContent = '✦ Gemini 辨識學生名單';
}
// ── Google Sheet 匯入 → 走客戶端 GAS ──
async function importFromGoogleSheet() {
  const input = document.getElementById('gsInput');
  const status = document.getElementById('gsStatus');
  const btn = document.getElementById('btnGsImport');
  if (!input || !input.value.trim()) return;
  let sourceSheetId = input.value.trim();
  const urlMatch = sourceSheetId.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (urlMatch) sourceSheetId = urlMatch[1];
  btn.disabled = true;
  status.style.color = 'var(--text-dim)'; status.textContent = '匯入中…';
  try {
    const res = await callGAS({ action: 'importFromGoogleSheet', sheetId: selectedClient.sheetId, sourceSheetId });
    if (!res.ok) throw new Error(res.error || '匯入失敗');
    if (!res.students || !res.students.length) {
      status.style.color = 'var(--muted)'; status.textContent = '找不到學生資料';
      btn.disabled = false; return;
    }
    status.style.color = 'var(--success)'; status.textContent = `✓ 匯入 ${res.students.length} 位`;
    switchRosterTab('manual');
    res.students.forEach(s => addManualRow(s));
    updateRosterCount();
    toast(`Google Sheet 匯入完成：${res.students.length} 位學生`, 'ok');
  } catch(e) {
    status.style.color = 'var(--danger)'; status.textContent = '匯入失敗：' + e.message;
  }
  btn.disabled = false;
}

function collectRosterStudents() {
  const result = [];
  document.querySelectorAll('#stuSelectWrap input[type=checkbox]:checked').forEach(cb => {
    const s = rosterSelectStudents[parseInt(cb.dataset.idx)];
    if (s) result.push({ name: s.name, enName: s.enName, grade: s.grade, phone: s.phone, note: s.note });
  });
  document.querySelectorAll('#manualTbody tr').forEach(tr => {
    const obj = {};
    tr.querySelectorAll('input[data-field]').forEach(inp => { obj[inp.dataset.field] = inp.value.trim(); });
    if (obj.name || obj.enName) result.push(obj);
  });
  return result;
}

function updateRosterCount() {
  const n = collectRosterStudents().length;
  ['rosterCount','rosterCountFooter'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = n; });
}

      document.getElementById('newTeacherTemp').value = '';
      await loadTeachers();
    } else { toast('✕ ' + (res.msg||'新增失敗'), 'err'); }
  } catch(e) { toast('連線失敗', 'err'); }
  document.getElementById('btnAddTeacher').disabled = false;
}

async function deleteTeacher(idx, code, name) {
  if (!confirm(`確認刪除老師「${name}」（授權碼：${code}）？`)) return;
  try {
    const res = await postGAS({ action: 'deleteTeacher', authCode, sheetId: selectedClient.sheetId, code });
    if (res.ok) { toast(`✓ 已刪除 ${name}`); await loadTeachers(); }
    else toast('✕ ' + (res.msg||'刪除失敗'), 'err');
  } catch(e) { toast('連線失敗', 'err'); }
}

function showError(msg) {
  document.getElementById('panelRight').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠</div><div>${msg}</div></div>`;
}

window.addEventListener('load', () => {
  const t = new Date();
  document.getElementById('startDate').value = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
});
</script>
</body>
